name: Git Config
description: Configure Git with the GitHub Actions bot identity.

runs:
  using: composite
  steps:
    - name: Configure Git
      shell: bash
      run: |
        set -euo pipefail

        # Configure repository identity
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
