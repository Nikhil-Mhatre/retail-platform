name: Update GitOps

on:
  workflow_call:
    inputs:
      service_name:
        description: Name of the microservice.
        required: true
        type: string

      image_tag:
        description: Docker image tag.
        required: true
        type: string
    secrets:
      GITOPS_TOKEN:
        required: true
      DOCKER_USERNAME:
        required: true

permissions:
  contents: read

concurrency:
  group: gitops-${{ inputs.service_name }}
  cancel-in-progress: false

jobs:
  update:
    name: Update Helm Values
    runs-on: ubuntu-latest

    env:
      VALUES_FILE: charts/${{ inputs.service_name }}/values.yaml
      IMAGE_REPOSITORY: ${{ secrets.DOCKER_USERNAME }}/retail-platform-${{ inputs.service_name }}

    steps:
      - name: Checkout GitOps Repository
        uses: actions/checkout@v7
        with:
          repository: Nikhil-Mhatre/retail-platform-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update Image Values
        shell: bash
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          test -f "$VALUES_FILE"

          yq -i '.image.repository = strenv(IMAGE_REPOSITORY)' "$VALUES_FILE"
          yq -i '.image.tag = strenv(IMAGE_TAG)' "$VALUES_FILE"

      - name: Verify Changes
        shell: bash
        run: |
          set -euo pipefail

          git diff -- "$VALUES_FILE"

      - name: Commit Changes
        id: commit
        shell: bash
        run: |
          set -euo pipefail

          git add "charts/${{ inputs.service_name }}/values.yaml"

          if git diff --cached --quiet; then
            echo "No changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore(gitops): update ${{ inputs.service_name }} image to ${{ inputs.image_tag }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push Changes
        if: steps.commit.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi

            git pull --rebase

            if [ "$attempt" -lt 5 ]; then
              sleep $((attempt * 2))
            fi
          done

          echo "Failed to push changes after 5 attempts."
          exit 1
