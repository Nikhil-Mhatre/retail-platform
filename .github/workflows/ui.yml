name: UI

on:
  push:
    branches:
      - dev
    paths:
      - src/ui/**

jobs:
  build:
    name: Build Image
    uses: ./.github/workflows/build-image.yml
    with:
      service_name: ui
    secrets: inherit

  update-gitops:
    name: Update GitOps
    needs: build
    uses: ./.github/workflows/update-gitops.yml
    with:
      service_name: ui
      image_repository: ${{ needs.build.outputs.image_repository }}
      image_tag: ${{ needs.build.outputs.image_tag }}
    secrets: inherit
