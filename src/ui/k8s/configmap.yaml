###############################################################################
# ConfigMap
#
# Stores application configuration that is NOT sensitive.
#
# Kubernetes injects these values into the container at runtime.
###############################################################################

apiVersion: v1
kind: ConfigMap

metadata:
  name: ui-config
  namespace: ui

data:
  ###########################################################################
  # Spring Configuration
  ###########################################################################
  SPRING_PROFILES_ACTIVE: "prod"

  ###########################################################################
  # Logging
  ###########################################################################
  LOGGING_LEVEL_ROOT: "INFO"

  ###########################################################################
  # Application Name
  ###########################################################################
  SPRING_APPLICATION_NAME: "ui"

  ###########################################################################
  # Example Feature Flag
  ###########################################################################
  FEATURE_X_ENABLED: "false"
