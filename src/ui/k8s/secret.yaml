###############################################################################
# Secret
#
# Stores sensitive configuration.
#
# NOTE:
# Kubernetes Secrets are Base64 encoded, NOT encrypted.
# Use external secret managers in production for enhanced security.
###############################################################################

apiVersion: v1
kind: Secret

metadata:
  name: ui-secret
  namespace: ui

type: Opaque

stringData:
  ###########################################################################
  # Example Credentials
  ###########################################################################
  DB_USERNAME: admin
  DB_PASSWORD: password123

  JWT_SECRET: my-super-secret-key
